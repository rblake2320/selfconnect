[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "selfconnect"
version = "0.10.4"
description = "OS-native Win32 bridge for AI agent orchestration — PostMessage, PrintWindow, UIA, cross-machine mesh, Telegram approvals, ClaudeGo dashboard."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
keywords = ["ai", "automation", "windows", "desktop", "win32", "agent"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Win32 (MS Windows)",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
    "Topic :: Desktop Environment",
]
dependencies = [
    "Pillow>=10.0.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
uia = [
    "pywinauto>=0.6.8",
    "comtypes>=1.4.0",
]
trust = [
    "cryptography>=42.0.0",
]
pq = [
    "cryptography>=42.0.0",
    "dilithium-py>=1.0.0",
]
shell = [
    "cryptography>=42.0.0",
]
mcp = [
    "mcp>=1.0.0",
]
telegram = [
    "python-dotenv>=1.0.0",
    "python-telegram-bot>=22.0",
]
ocr = [
    "pytesseract>=0.3.10",
]
claudego = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pywinauto>=0.6.8",
]
full = [
    "pywinauto>=0.6.8",
    "comtypes>=1.4.0",
    "pytesseract>=0.3.10",
    "python-dotenv>=1.0.0",
    "python-telegram-bot>=22.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "cryptography>=42.0.0",
    "dilithium-py>=1.0.0",
    "mcp>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/rblake2320/selfconnect"
Repository = "https://github.com/rblake2320/selfconnect"

[tool.hatch.build.targets.wheel]
artifacts = [
    "experiments/fabric_v2/results/baseline_5agent_fabric_v2_service_transport.json",
    "experiments/fabric_v2/results/SC_FABRIC_SERVICE_20260621_1135_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_service_selftest_20260621_113419_redacted.json",
    "experiments/fabric_v2/results/baseline_5agent_fabric_v2_frame_mailbox.json",
    "experiments/fabric_v2/results/fabric_v2_5agent_baseline_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_host_selftest_20260621_074925_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_overlapped_pipe_selftest_20260621_080840_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_router_restart_selftest_20260621_081434_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_router_state_20260621_081434_redacted.json",
    "experiments/fabric_v2/results/fabric_v2_selftest_20260621_073951_redacted.json",
]
include = [
    "_win32_abi.py",
    "self_connect.py",
    "sc_cli.py",
    "sc_mcp.py",
    "sc_mesh_registry.py",
    "sc_mesh_lease.py",
    "sc_fleet_guard.py",
    "sc_fabric_benchmark.py",
    "sc_fabric_host.py",
    "sc_fabric_router.py",
