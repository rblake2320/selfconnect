[project.scripts]
selfconnect = "sc_cli:main"
selfconnect-mcp = "sc_mcp:main"
selfconnect-mesh = "sc_mesh_registry:main"
selfconnect-fleet = "sc_fleet_guard:main"
selfconnect-bench = "sc_fabric_benchmark:main"
selfconnect-fabric = "sc_fabric_v2:main"
selfconnect-fabric-host = "sc_fabric_host:main"
selfconnect-fabric-router = "sc_fabric_router:main"
selfconnect-fabric-service = "sc_fabric_service:main"
selfconnect-local-model = "sc_local_model_role:main"

[tool.pytest.ini_options]
testpaths = ["tests", "test_self_connect.py"]
asyncio_mode = "auto"
