name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Python syntax + imports
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[service]" ruff pytest pytest-asyncio python-dotenv python-telegram-bot fastapi uvicorn httpx cryptography dilithium-py

      - name: Verify Windows service dependency
        run: python -c "import pywintypes, win32file, win32pipe, winerror; print('pywin32 service dependency available')"

      - name: Ruff lint — all SDK files
        run: >
          ruff check
          self_connect.py
          antigravity_controller.py
          approval_partner.py
          approval_telegram.py
          claudego/
          tools/release_gate.py
          tests/test_release_gate.py

      - name: Syntax check
        run: python -m py_compile self_connect.py

      - name: Import check (no Win32 display needed)
        run: |
          python -c "
          import sys, ctypes, types
          if not hasattr(ctypes, 'windll'):
              ctypes.windll = types.SimpleNamespace(
                  user32=types.SimpleNamespace(
                      EnumWindows=lambda *a: None,
                      IsWindowVisible=lambda *a: False,
                  ),
                  kernel32=types.SimpleNamespace(GetConsoleWindow=lambda: 0),
                  gdi32=types.SimpleNamespace(),
              )
          import ast, pathlib
          tree = ast.parse(pathlib.Path('self_connect.py').read_text(encoding='utf-8'))
          funcs = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
          required = ['list_windows','find_target','focus_window','send_string',
                      'capture_window','save_capture','build_frame','parse_frame',
                      'send_frame','verify_delivery']
          missing = [f for f in required if f not in funcs]
          if missing:
              print(f'MISSING: {missing}'); sys.exit(1)
          print(f'All {len(required)} required functions present')
          "

      - name: Version check
        run: python -c "import ast,pathlib; tree=ast.parse(pathlib.Path('self_connect.py').read_text(encoding='utf-8')); [print('Version:', n.value.s) for n in ast.walk(tree) if isinstance(n, ast.Assign) and any(getattr(t,'id','') == '__version__' for t in n.targets)]"

      - name: Syntax check — claudego
        run: python -m py_compile claudego/__main__.py claudego/scanner.py claudego/dashboard.py claudego/tray.py claudego/notifier.py

      - name: Syntax check — runbook_writer
        run: python -m py_compile runbook_writer.py

      - name: Unit tests (no Win32 desktop needed)
        run: python -m pytest tests/ -v --tb=short

      - name: Release claim and package audit
        run: python tools/release_gate.py audit --root .

      - name: SDK smoke tests
        if: ${{ !cancelled() }}
        run: python test_self_connect.py
