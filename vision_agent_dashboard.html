<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SelfConnect</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #09090b;
    color: #e4e4e7;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* phosphor accent */
  :root {
    --acc: oklch(0.78 0.16 145);    /* phosphor green */
    --acc-dim: oklch(0.55 0.13 145);
    --acc-bg: oklch(0.78 0.16 145 / 0.12);
    --warn: oklch(0.78 0.15 75);
    --bad: oklch(0.68 0.20 25);
    --info: oklch(0.72 0.13 230);
    --gray: oklch(0.65 0.01 250);
    --yellow: oklch(0.85 0.16 95);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  /* subtle scanline on capture viewer */
  .scanlines::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 2px,
      rgba(255,255,255,0.02) 3px
    );
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  /* live dot pulse */
  @keyframes livepulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .live-dot { animation: livepulse 1.4s ease-in-out infinite; }

  /* recording pulse */
  @keyframes recpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
    50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
  }
  .rec-pulse { animation: recpulse 1.6s ease-out infinite; }

  /* bounding box flicker on hover */
  .bbox { transition: filter 120ms, background-color 120ms; }
  .bbox:hover { filter: brightness(1.4); }

  /* reticle */
  @keyframes reticleSpin { to { transform: rotate(360deg); } }
  .reticle-spin { animation: reticleSpin 8s linear infinite; }

  /* tab underline */
  .tab-active { box-shadow: inset 0 -2px 0 0 var(--acc); color: #fafafa; }

  /* tiny grid pattern */
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* subtle inset border on cards */
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
  }
  .card-header {
    border-bottom: 1px solid #27272a;
    padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a1a1aa;
    font-weight: 600;
  }

  button:focus-visible, input:focus-visible { outline: 1px solid var(--acc); outline-offset: 1px; }

  /* range slider */
  input[type=range] { accent-color: oklch(0.78 0.16 145); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

// ── API config ──────────────────────────────────────────────────────────────
// Auto-detect: if served from the vision server itself use current origin,
// otherwise fall back to stored value or default.
const _origin = window.location.origin;
const _isVisionServer = _origin.includes('7421');
const API = _isVisionServer
  ? _origin
  : (localStorage.getItem('sc_api') || 'http://127.0.0.1:7421');
const WS_BASE = API.replace(/^http/, 'ws');

async function apiFetch(method, path, token, body) {
  const r = await fetch(`${API}${path}`, {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      ...(body != null ? { 'Content-Type': 'application/json' } : {}),
    },
    body: body != null ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
const apiGet  = (path, token)        => apiFetch('GET',  path, token, null);
const apiPost = (path, token, body)  => apiFetch('POST', path, token, body ?? {});

// ── icons (inline svgs) ─────────────────────────────────────────────────────
const Icon = ({ d, size=14, className="", strokeWidth=1.6 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {d}
  </svg>
);
const I = {
  play: <Icon d={<polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none" />} />,
  pause: <Icon d={<><rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/></>} />,
  stop: <Icon d={<rect x="5" y="5" width="14" height="14" fill="currentColor" stroke="none" />} />,
  rec: <Icon d={<circle cx="12" cy="12" r="6" fill="currentColor" stroke="none" />} />,
  x: <Icon d={<><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></>} />,
  gear: <Icon d={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />,
  eye: <Icon d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
  target: <Icon d={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>} />,
  mouse: <Icon d={<><path d="M3 3l7 17 2.5-7.5L20 10z"/></>} />,
  keyboard: <Icon d={<><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M7 14h10"/></>} />,
  camera: <Icon d={<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>} />,
  send: <Icon d={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>} />,
  arrowRight: <Icon d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />,
  trash: <Icon d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></>} />,
  copy: <Icon d={<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />,
  cpu: <Icon d={<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></>} />,
  brain: <Icon d={<><path d="M9 3a3 3 0 0 0-3 3v.5A2.5 2.5 0 0 0 4 9a2.5 2.5 0 0 0 1 4 2.5 2.5 0 0 0 0 4 2.5 2.5 0 0 0 2 4 3 3 0 0 0 6 0V3a3 3 0 0 0-3-3z" transform="translate(0 1)"/><path d="M15 3a3 3 0 0 1 3 3v.5A2.5 2.5 0 0 1 20 9a2.5 2.5 0 0 1-1 4 2.5 2.5 0 0 1 0 4 2.5 2.5 0 0 1-2 4 3 3 0 0 1-6 0" transform="translate(0 1)"/></>} />,
  window: <Icon d={<><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></>} />,
  refresh: <Icon d={<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>} />,
  search: <Icon d={<><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
  zap: <Icon d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" stroke="none"/>} />,
};

// ── detection class styles ───────────────────────────────────────────────────
const clsStyle = {
  button:     { stroke:'rgb(34 197 94)',  fill:'rgba(34,197,94,0.10)',  text:'text-emerald-400', name:'BUTTON' },
  text_field: { stroke:'rgb(59 130 246)', fill:'rgba(59,130,246,0.10)', text:'text-blue-400',    name:'TEXT_FIELD' },
  label:      { stroke:'rgb(161 161 170)',fill:'rgba(161,161,170,0.10)',text:'text-zinc-400',   name:'LABEL' },
  image:      { stroke:'rgb(234 179 8)',  fill:'rgba(234,179,8,0.10)',  text:'text-yellow-400',  name:'IMAGE' },
};

// ── top bar ─────────────────────────────────────────────────────────────────
function TopBar({ fps, modelStatus, wsConn, onConfig }) {
  const connDot = wsConn === 'connected' ? 'bg-emerald-400 live-dot' : wsConn === 'reconnecting' ? 'bg-amber-400' : 'bg-rose-500';
  return (
    <div className="h-12 shrink-0 flex items-center justify-between px-4 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur">
      <div className="flex items-center gap-3">
        <div className="w-7 h-7 rounded-md flex items-center justify-center"
             style={{background:'linear-gradient(135deg, oklch(0.78 0.16 145 / 0.20), oklch(0.78 0.16 145 / 0.05))', border:'1px solid oklch(0.78 0.16 145 / 0.4)'}}>
          <div className="reticle-spin">{I.target}</div>
        </div>
        <div className="flex items-baseline gap-2">
          <span className="text-sm font-semibold tracking-tight">SelfConnect</span>
          <span className="mono text-[10px] text-zinc-500">v1.0.0</span>
        </div>
        <span className="mono text-[10px] px-1.5 py-0.5 rounded border border-zinc-800 text-zinc-400 ml-2">LOCAL</span>
      </div>
      <div className="flex items-center gap-2">
        <div className="flex items-center gap-2 px-2.5 py-1 rounded-md border border-zinc-800 bg-zinc-900/60">
          <span className={`w-1.5 h-1.5 rounded-full ${connDot}`}></span>
          <span className="mono text-[11px] text-zinc-300">{fps > 0 ? fps.toFixed(1) : '—'}<span className="text-zinc-500"> fps</span></span>
        </div>
        <ModelBadge name="DETECT" status={modelStatus.yolo}   detail="win32+vl" />
        <ModelBadge name="VL"     status={modelStatus.vl}     detail="llava:7b" />
        <ModelBadge name="SDK"    status={modelStatus.sdk}    detail={modelStatus.sdk==='ok'?'connected':'offline'} />
        <button onClick={onConfig} className="ml-1 w-8 h-8 rounded-md border border-zinc-800 bg-zinc-900 hover:bg-zinc-800 flex items-center justify-center text-zinc-400">
          {I.gear}
        </button>
      </div>
    </div>
  );
}

function ModelBadge({ name, status, detail }) {
  const dot = status==='ok' ? 'bg-emerald-400' : status==='degraded' ? 'bg-amber-400' : 'bg-rose-500';
  return (
    <div className="flex items-center gap-1.5 px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/60">
      <span className={`w-1.5 h-1.5 rounded-full ${dot}`}></span>
      <span className="mono text-[11px] text-zinc-300">{name}</span>
      <span className="mono text-[10px] text-zinc-500">{detail}</span>
    </div>
  );
}

// ── config panel (gear button) ───────────────────────────────────────────────
function ConfigPanel({ token, onToken, onClose, wsConn }) {
  const [draft, setDraft] = useState(token);
  const connLabel = wsConn === 'connected' ? 'connected' : wsConn === 'reconnecting' ? 'reconnecting…' : 'not connected';
  const connDot   = wsConn === 'connected' ? 'bg-emerald-400' : wsConn === 'reconnecting' ? 'bg-amber-400' : 'bg-rose-500';
  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onClick={onClose}>
      <div className="card w-80 p-4 space-y-3" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <span className="text-sm font-semibold">Connection Config</span>
          <button onClick={onClose} className="text-zinc-500 hover:text-zinc-300">{I.x}</button>
        </div>
        <div>
          <div className="mono text-[10px] text-zinc-500 mb-1 uppercase">Server URL</div>
          <div className="mono text-[12px] text-zinc-400 px-2 py-1.5 rounded border border-zinc-800 bg-zinc-950">{API}</div>
        </div>
        <div>
          <div className="mono text-[10px] text-zinc-500 mb-1 uppercase">Session Token</div>
          <input
            type="text"
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && (onToken(draft.trim()), onClose())}
            placeholder="paste token from server terminal"
            className="w-full mono text-[12px] px-2 py-1.5 rounded border border-zinc-700 bg-zinc-950 text-zinc-200 outline-none"
          />
          <div className="mono text-[10px] text-zinc-600 mt-1">Printed at startup: python run_server.py</div>
        </div>
        <button
          onClick={() => { onToken(draft.trim()); onClose(); }}
          className="w-full py-2 rounded text-[12px] font-medium"
          style={{background:'oklch(0.78 0.16 145 / 0.18)', color:'oklch(0.85 0.16 145)', border:'1px solid oklch(0.78 0.16 145 / 0.4)'}}>
          Connect
        </button>
        <div className="flex items-center gap-2 justify-center">
          <span className={`w-1.5 h-1.5 rounded-full ${connDot}`}></span>
          <span className="mono text-[10px] text-zinc-500">{connLabel}</span>
        </div>
      </div>
    </div>
  );
}

// ── live capture (replaces MockScreen) ──────────────────────────────────────
function LiveCapture({ frameUrl }) {
  if (!frameUrl) {
    return (
      <div className="absolute inset-0 flex items-center justify-center bg-zinc-950">
        <div className="text-center space-y-1">
          <div className="mono text-[11px] text-zinc-500">no capture stream</div>
          <div className="mono text-[10px] text-zinc-600">attach a window to start · gear → token</div>
        </div>
      </div>
    );
  }
  return <img src={frameUrl} className="absolute inset-0 w-full h-full object-contain" alt="" draggable="false" />;
}

// ── capture viewer ────────────────────────────────────────────────────────────
function CaptureViewer({ detections, frameUrl, frameCount, activeHwnd, hovered, onHover, onClick, paused, onTogglePause }) {
  return (
    <div className="card flex flex-col h-full">
      <div className="card-header">
        <div className="flex items-center gap-2">
          <span className={`w-1.5 h-1.5 rounded-full ${frameUrl ? 'bg-emerald-400 live-dot' : 'bg-zinc-600'}`}></span>
          <span>Window Capture</span>
          <span className="mono normal-case tracking-normal text-[10px] text-zinc-500">· {activeHwnd || 'no window attached'}</span>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={onTogglePause}
            className="mono text-[10px] px-2 py-1 rounded border border-zinc-800 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 flex items-center gap-1">
            {paused ? I.play : I.pause}
            {paused ? 'RESUME' : 'PAUSE'}
          </button>
          <button className="mono text-[10px] px-2 py-1 rounded border border-zinc-800 bg-zinc-900 hover:bg-zinc-800 text-zinc-300">FIT</button>
        </div>
      </div>
      <div className="relative flex-1 m-2 rounded-md overflow-hidden bg-black scanlines border border-zinc-800">
        <LiveCapture frameUrl={frameUrl} />
        <DetectionLayer detections={detections} hovered={hovered} onHover={onHover} onClick={onClick} />
        <Reticle />
        <div className="absolute top-2 left-2 mono text-[10px] text-emerald-400/80 flex items-center gap-1.5">
          <span className={`w-1.5 h-1.5 rounded-full ${frameUrl ? 'bg-emerald-400 live-dot' : 'bg-zinc-600'}`}></span>
          {frameUrl ? 'LIVE · JPEG · WS' : 'STANDBY'}
        </div>
        <div className="absolute top-2 right-2 mono text-[10px] text-zinc-300/80">
          frame #{String(frameCount).padStart(5,'0')}
        </div>
        <div className="absolute bottom-2 left-2 mono text-[10px] text-zinc-400">
          {detections.length} detections · win32+vl · conf≥0.70
        </div>
        <div className="absolute bottom-2 right-2 mono text-[10px] text-zinc-400">
          tap a box →
        </div>
      </div>
      <div className="px-3 pb-3 pt-1 flex items-center gap-3 flex-wrap">
        {Object.entries(clsStyle).map(([k,v]) => (
          <div key={k} className="flex items-center gap-1.5">
            <span className="w-3 h-3 rounded-sm border" style={{borderColor:v.stroke, background:v.fill}}/>
            <span className="mono text-[10px] text-zinc-400">{v.name}</span>
          </div>
        ))}
        <div className="flex-1" />
        <span className="mono text-[10px] text-zinc-500">PrintWindow · ImageGrab fallback</span>
      </div>
    </div>
  );
}

function Reticle() {
  return (
    <>
      {[
        'top-0 left-0 border-t-2 border-l-2',
        'top-0 right-0 border-t-2 border-r-2',
        'bottom-0 left-0 border-b-2 border-l-2',
        'bottom-0 right-0 border-b-2 border-r-2',
      ].map((c,i)=>(
        <div key={i} className={`absolute ${c} w-3 h-3`} style={{borderColor:'oklch(0.78 0.16 145 / 0.5)'}}/>
      ))}
    </>
  );
}

function DetectionLayer({ detections, hovered, onHover, onClick }) {
  return (
    <div className="absolute inset-0">
      {detections.map(d => {
        const s = clsStyle[d.cls] || clsStyle.label;
        const isHovered = hovered === d.id;
        return (
          <button
            key={d.id}
            className="bbox absolute group"
            onMouseEnter={() => onHover(d.id)}
            onMouseLeave={() => onHover(null)}
            onClick={() => onClick(d)}
            style={{
              left: `${d.x*100}%`, top: `${d.y*100}%`,
              width: `${d.w*100}%`, height: `${d.h*100}%`,
              border: `${isHovered?2:1.5}px solid ${s.stroke}`,
              background: isHovered ? s.fill.replace('0.10','0.25') : s.fill,
              borderRadius: 2,
              cursor: 'pointer',
            }}>
            <div className="absolute -top-[15px] left-0 mono text-[9px] px-1 py-px rounded-sm whitespace-nowrap"
                 style={{background:s.stroke, color:'#0a0a0a', fontWeight:600}}>
              {s.name} · {d.label} · {(d.conf*100).toFixed(0)}%
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── AI understanding ─────────────────────────────────────────────────────────
function AIUnderstanding({ text, tokens, ms, tags }) {
  return (
    <div className="card">
      <div className="card-header">
        <div className="flex items-center gap-2">
          <span style={{color:'var(--acc)'}}>{I.brain}</span>
          <span>AI Understanding</span>
        </div>
        <div className="flex items-center gap-2 mono text-[10px] text-zinc-500 normal-case tracking-normal">
          <span>llava:7b</span>·<span>{tokens||0} tok</span>·<span>{ms||0}ms</span>
        </div>
      </div>
      <div className="p-3">
        <div className="mono text-[10px] text-zinc-500 mb-1.5">▌ description</div>
        <p className="text-[13px] leading-relaxed text-zinc-200" style={{textWrap:'pretty'}}>

// ── helpers ───────────────────────────────────────────────────────────────────
function nowStamp() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
}

// ── app ────────────────────────────────────────────────────────────────────────
function App() {
  // connection
  const [token, setToken]         = useState(() => localStorage.getItem('sc_token') || '');
  const [showConfig, setShowConfig] = useState(() => !localStorage.getItem('sc_token'));
  const [wsConn, setWsConn]       = useState('disconnected');
  const wsCapRef  = useRef(null);
  const wsEvtRef  = useRef(null);
  const capDead   = useRef(false);
  const evtDead   = useRef(false);

  // capture
  const [frameUrl, setFrameUrl]     = useState(null);
  const [frameCount, setFrameCount] = useState(0);
  const [fps, setFps]               = useState(0);
  const [paused, setPaused]         = useState(false);
  const pausedRef     = useRef(false);
  const lastFrameMs   = useRef(0);
  const fpsAccum      = useRef([]);
  const [hovered, setHovered]       = useState(null);
  const [activeHwnd, setActiveHwnd] = useState('');

  // live data
  const [detections, setDetections] = useState([]);
  const [windows, setWindows]       = useState([]);
  const [queue, setQueue]           = useState([]);
  const [log, setLog]               = useState([]);
  const [vl, setVL]                 = useState({ text:'', tags:[], tokens:0, ms:0 });
  const [health, setHealth]         = useState({ sdk:'down', yolo:'down', vl:'down' });

  // macro
  const [recording, setRecording]   = useState(false);
  const [macros, setMacros]         = useState([]);
  const [recStart, setRecStart]     = useState(null);
  const [recElapsed, setRecElapsed] = useState('00:00.00');

  const pushLog = useCallback((entry) => {
    setLog(l => [{ t: nowStamp(), ...entry }, ...l].slice(0, 200));
  }, []);

  const applyToken = useCallback((t) => {
    setToken(t);
    localStorage.setItem('sc_token', t);
  }, []);

  // keep pausedRef in sync so WS onmessage can read it without stale closure
  useEffect(() => { pausedRef.current = paused; }, [paused]);

  // ── WS capture ─────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!token) return;
    capDead.current = false;
    function connect() {
      if (capDead.current) return;
      const ws = new WebSocket(`${WS_BASE}/ws/capture`);
      ws.binaryType = 'arraybuffer';
      wsCapRef.current = ws;
      ws.onopen  = () => pushLog({ kind:'ws', status:'ok', msg:'Capture stream connected' });
      ws.onmessage = (e) => {
        if (pausedRef.current) return;
        const blob = new Blob([e.data], { type: 'image/jpeg' });
        const url  = URL.createObjectURL(blob);
        setFrameUrl(prev => { if (prev) URL.revokeObjectURL(prev); return url; });
        setFrameCount(n => n + 1);
        const now = Date.now();
        if (lastFrameMs.current) {
          fpsAccum.current.push(1000 / (now - lastFrameMs.current));
          if (fpsAccum.current.length >= 8) {
            setFps(fpsAccum.current.reduce((a,b)=>a+b,0) / fpsAccum.current.length);
            fpsAccum.current = [];
          }
        }
        lastFrameMs.current = now;
      };
      ws.onclose = () => { if (!capDead.current) setTimeout(connect, 2000); };
      ws.onerror = () => ws.close();
    }
    connect();
    return () => { capDead.current = true; wsCapRef.current?.close(); };
  }, [token, pushLog]);

  // ── WS events ──────────────────────────────────────────────────────────────
  useEffect(() => {
    if (!token) return;
    evtDead.current = false;
    let delay = 1000;
    function connect() {
      if (evtDead.current) return;
      setWsConn('reconnecting');
      const ws = new WebSocket(`${WS_BASE}/ws/events`);
      wsEvtRef.current = ws;
      ws.onopen = () => {
        setWsConn('connected');
        delay = 1000;
        pushLog({ kind:'ws', status:'ok', msg:'Events bus connected' });
        apiGet('/api/windows', token).then(d => setWindows(d)).catch(() => {});
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          switch (msg.channel) {
            case 'detections': setDetections(msg.data || []); break;
            case 'log':        pushLog(msg.data); break;
            case 'queue':      setQueue(msg.data || []); break;
            case 'health':     setHealth(msg.data || {}); break;
            case 'windows':    setWindows(msg.data || []); break;
            case 'vl':         setVL(msg.data || {}); break;
          }
        } catch (_) {}
      };
      ws.onclose = () => {
        if (evtDead.current) return;
        setWsConn('disconnected');
        delay = Math.min(delay * 2, 30000);
        setTimeout(connect, delay);
      };
      ws.onerror = () => ws.close();
    }
    connect();
    return () => { evtDead.current = true; wsEvtRef.current?.close(); };
  }, [token, pushLog]);

  // ── recording timer ─────────────────────────────────────────────────────────
  useEffect(() => {
    if (!recording || !recStart) return;
    const id = setInterval(() => {
      const ms = Date.now() - recStart;
      const s  = Math.floor(ms / 1000);
      const cs = Math.floor((ms % 1000) / 10);
      setRecElapsed(`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(cs).padStart(2,'0')}`);
    }, 50);
    return () => clearInterval(id);
  }, [recording, recStart]);

  // ── handlers ────────────────────────────────────────────────────────────────
  const onDetectionClick = (d) => {
    const style = clsStyle[d.cls] || clsStyle.label;
    pushLog({ kind:'select', status:'ok', msg:`${style.name} "${d.label}" conf ${(d.conf*100).toFixed(0)}%` });
  };

  const onSelectWindow = async (hwnd) => {
    try {
      await apiPost(`/api/windows/${hwnd}/attach`, token, null);
      setWindows(ws => ws.map(w => ({ ...w, active: w.hwnd === hwnd })));
      setActiveHwnd(hwnd);
      pushLog({ kind:'attach', status:'ok', msg:`Attached to ${hwnd}` });
    } catch (e) {
      pushLog({ kind:'attach', status:'fail', msg:`Attach failed: ${e.message}` });
    }
  };

  const onRefreshWindows = async () => {
    try {
      const data = await apiGet('/api/windows', token);
      setWindows(data);
      pushLog({ kind:'enum', status:'ok', msg:`Found ${data.length} windows` });
    } catch (e) {
      pushLog({ kind:'enum', status:'fail', msg:`Scan failed — check token (${e.message})` });
    }
  };

  const onQueueAction = async (action, id) => {
    if (action === 'play') {
      try {
        await apiPost('/api/actions/run', token, null);
        pushLog({ kind:'queue', status:'ok', msg:'Queue executing' });
      } catch (e) {
        pushLog({ kind:'queue', status:'fail', msg:`Run failed: ${e.message}` });
      }
    } else if (action === 'pause') {
      pushLog({ kind:'queue', status:'pending', msg:'Pause not yet implemented server-side' });
    } else if (action === 'clear') {
      setQueue([]);
      pushLog({ kind:'queue', status:'ok', msg:'Queue cleared' });
    } else if (action === 'cancel') {
      setQueue(q => q.filter(x => x.id !== id));
    }
  };

  const toggleRecord = async () => {
    if (!recording) {
      try {
        await apiPost('/api/macros/start', token, null);
        setRecording(true);
        setMacros([]);
        setRecStart(Date.now());
        pushLog({ kind:'macro', status:'ok', msg:'Recording started' });
      } catch (e) {
        pushLog({ kind:'macro', status:'fail', msg:`Start failed: ${e.message}` });
      }
    } else {
      try {
        const data = await apiPost('/api/macros/stop', token, null);
        setRecording(false);
        setMacros(data.steps || []);
        pushLog({ kind:'macro', status:'ok', msg:`Stopped · ${(data.steps||[]).length} steps` });
      } catch (e) {
        setRecording(false);
        pushLog({ kind:'macro', status:'fail', msg:`Stop failed: ${e.message}` });
      }
    }
  };

  const replayMacro = async () => {
    try {
      await apiPost('/api/macros/replay', token, null);
      pushLog({ kind:'macro', status:'ok', msg:`Replaying ${macros.length} steps` });
    } catch (e) {
      pushLog({ kind:'macro', status:'fail', msg:`Replay failed: ${e.message}` });
    }
  };

  const exportMacro = async () => {
    try {
      const data = await apiPost('/api/macros/export', token, null);
      pushLog({ kind:'macro', status:'ok', msg:`Exported: ${data.path}` });
    } catch (e) {
      pushLog({ kind:'macro', status:'fail', msg:`Export failed: ${e.message}` });
    }
  };

  const onQuick = async (k) => {
    if (k === 'look') {
      pushLog({ kind:'vl', status:'pending', msg:'Requesting VL description…' });
      try {
        const data = await apiPost('/api/vl/describe', token, null);
        setVL(data);
        pushLog({ kind:'vl', status:'ok', msg:`${data.tokens} tokens · ${data.ms}ms` });
      } catch (e) {
        pushLog({ kind:'vl', status:'fail', msg:`VL failed: ${e.message}` });
      }
      return;
    }
    const labels = { find:'Describe the element you want to find below', click:'Type target coords or element name below', type:'Type your text below and press EXECUTE', capture:'Capture triggered via server' };
    pushLog({ kind:k, status:'pending', msg: labels[k] || k });
  };

  const onCommand = async (text) => {
    pushLog({ kind:'nl', status:'pending', msg:`Queuing: "${text}"` });
    try {
      const data = await apiPost('/api/actions', token, { command: text });
      if (data.items) setQueue(data.items);
      pushLog({ kind:'nl', status:'ok', msg:`Queued ${(data.items||[]).length} action(s)` });
    } catch (e) {
      pushLog({ kind:'nl', status:'fail', msg:`Failed: ${e.message}` });
    }
  };

  const modelStatus = { yolo: health.yolo || 'down', vl: health.vl || 'down', sdk: health.sdk || 'down' };

  return (
    <div className="h-full w-full flex flex-col">
      {showConfig && (
        <ConfigPanel token={token} onToken={applyToken} onClose={() => setShowConfig(false)} wsConn={wsConn} />
      )}
      <TopBar fps={fps} modelStatus={modelStatus} wsConn={wsConn} onConfig={() => setShowConfig(true)} />

      <div className="flex-1 min-h-0 grid gap-3 p-3 grid-bg" style={{gridTemplateColumns:'40fr 35fr 25fr'}}>
        {/* LEFT */}
        <div className="min-h-0 flex flex-col gap-3">
          <CaptureViewer
            detections={detections}
            frameUrl={frameUrl}
            frameCount={frameCount}
            activeHwnd={activeHwnd}
            hovered={hovered}
            onHover={setHovered}
            onClick={onDetectionClick}
            paused={paused}
            onTogglePause={() => setPaused(p => !p)}
          />
        </div>

        {/* CENTER */}
        <div className="min-h-0 flex flex-col gap-3 overflow-auto">
          <AIUnderstanding text={vl.text} tokens={vl.tokens} ms={vl.ms} tags={vl.tags} />
          <ActionQueue queue={queue} onAction={onQueueAction} />
          <MacroRecorder recording={recording} onToggle={toggleRecord} onReplay={replayMacro} onExport={exportMacro} macros={macros} elapsed={recElapsed} />
        </div>

        {/* RIGHT */}
        <div className="min-h-0 flex flex-col gap-3">
          <TargetWindows windows={windows} onSelect={onSelectWindow} onRefresh={onRefreshWindows} />
          <ActionLog log={log} onClear={() => setLog([])} />
          <ConnectionStatus status={health} wsConn={wsConn} />
        </div>
      </div>

      <BottomBar onQuick={onQuick} onSubmit={onCommand} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
