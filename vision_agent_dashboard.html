<style>
  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #09090b;
    color: #e4e4e7;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* phosphor accent */
  :root {
    --acc: oklch(0.78 0.16 145);    /* phosphor green */
    --acc-dim: oklch(0.55 0.13 145);
    --acc-bg: oklch(0.78 0.16 145 / 0.12);
    --warn: oklch(0.78 0.15 75);
    --bad: oklch(0.68 0.20 25);
    --info: oklch(0.72 0.13 230);
    --gray: oklch(0.65 0.01 250);
    --yellow: oklch(0.85 0.16 95);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  /* subtle scanline on capture viewer */
  .scanlines::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 2px,
      rgba(255,255,255,0.02) 3px
    );
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  /* live dot pulse */
  @keyframes livepulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .live-dot { animation: livepulse 1.4s ease-in-out infinite; }

  /* recording pulse */
  @keyframes recpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
    50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
  }
  .rec-pulse { animation: recpulse 1.6s ease-out infinite; }

  /* bounding box flicker on hover */
  .bbox { transition: filter 120ms, background-color 120ms; }
  .bbox:hover { filter: brightness(1.4); }

  /* reticle */
  @keyframes reticleSpin { to { transform: rotate(360deg); } }
  .reticle-spin { animation: reticleSpin 8s linear infinite; }

  /* tab underline */
  .tab-active { box-shadow: inset 0 -2px 0 0 var(--acc); color: #fafafa; }

  /* tiny grid pattern */
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* subtle inset border on cards */
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
  }
  .card-header {
    border-bottom: 1px solid #27272a;
    padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a1a1aa;
    font-weight: 600;
  }

  button:focus-visible, input:focus-visible { outline: 1px solid var(--acc); outline-offset: 1px; }

  /* range slider */
  input[type=range] { accent-color: oklch(0.78 0.16 145); }
</style>
</head>

function ModelBadge({ name, status, detail }) {
  const dot = status==='ok' ? 'bg-emerald-400' : status==='warn' ? 'bg-amber-400' : 'bg-rose-500';
  return (
    <div className="flex items-center gap-1.5 px-2 py-1 rounded-md border border-zinc-800 bg-zinc-900/60">
      <span className={`w-1.5 h-1.5 rounded-full ${dot}`}></span>
      <span className="mono text-[11px] text-zinc-300">{name}</span>
      <span className="mono text-[10px] text-zinc-500">{detail}</span>
    </div>
  );
}

function QueueRow({ q, idx, onAction }) {
  const stateColor = q.state==='running' ? 'text-emerald-400' : q.state==='pending' ? 'text-zinc-400' : 'text-rose-400';
  const stateBg = q.state==='running' ? 'bg-emerald-500/10 border-emerald-500/30'
                : q.state==='pending' ? 'bg-zinc-900 border-zinc-800'
                : 'bg-rose-500/10 border-rose-500/30';
  const kindIcon = q.kind==='click' ? I.mouse : q.kind==='type' ? I.keyboard : I.arrowRight;
  return (
    <div className={`flex items-center gap-2 mx-1 my-0.5 px-2 py-1.5 rounded border ${stateBg}`}>
      <div className="mono text-[10px] text-zinc-500 w-6">{String(idx+1).padStart(2,'0')}</div>
      <div className={`${stateColor}`}>{kindIcon}</div>
      <div className="mono text-[11px] text-zinc-300 uppercase w-12">{q.kind}</div>
      <div className="mono text-[11px] text-zinc-400 flex-1 truncate">{q.target}{q.value ? <span className="text-zinc-500"> · "{q.value}"</span> : null}</div>
      <div className={`mono text-[10px] uppercase ${stateColor} w-16 text-right`}>
        {q.state==='running' && <span className="inline-flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400 live-dot"></span>running</span>}
        {q.state!=='running' && q.state}

      <button onClick={()=>onAction('cancel', q.id)} className="text-zinc-500 hover:text-rose-400">{I.x}</button>
    </div>
  );
}

// ---------- helper: format time ----------
function nowStamp() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  const ms = String(d.getMilliseconds()).padStart(3,'0');
  return `${hh}:${mm}:${ss}.${ms}`;
}

// ---------- app ----------
function App() {
  // capture
  const [paused, setPaused] = useState(false);
  const [frame, setFrame] = useState(4823);
  const [fps, setFps] = useState(58.2);
  const [hovered, setHovered] = useState(null);

  // detections (jitter slightly to simulate live updates)
  const [detections, setDetections] = useState(initialDetections);

  // queue + log
  const [queue, setQueue] = useState(initialQueue);
  const [log, setLog] = useState(initialLog);

  // windows
  const [windows, setWindows] = useState(initialWindows);

  // macro
  const [recording, setRecording] = useState(false);
  const [macros, setMacros] = useState(initialMacros);
  const [recStart, setRecStart] = useState(null);
  const [recElapsed, setRecElapsed] = useState('00:00.00');

  // models
  const [modelStatus] = useState({ yolo:'ok', vl:'ok', claude:'ok' });
  const [connStatus] = useState({ sdk:'ok', yolo:'ok', vl:'ok', claude:'warn' });

  // VL description state
  const [vlText] = useState('I see a centered authentication card on a dark desktop. The card contains the Acme logo, a header reading "Welcome back," followed by two text inputs labeled EMAIL (currently containing "test@example.com") and PASSWORD (masked). Below them is a primary blue Submit button and a small "Forgot password?" link aligned to the bottom-left of the form.');

  const pushLog = useCallback((entry) => {
    setLog(l => [{ t: nowStamp(), ...entry }, ...l].slice(0, 200));
  }, []);

  // simulate frame ticker
  useEffect(() => {
    if (paused) return;
    const id = setInterval(() => {
      setFrame(f => f + 1);
      setFps(prev => Math.max(45, Math.min(62, prev + (Math.random()-0.5)*2)));
      // small jitter on detections
      setDetections(prev => prev.map(d => ({
        ...d,
        x: Math.max(0, Math.min(0.9, d.x + (Math.random()-0.5)*0.0015)),
        y: Math.max(0, Math.min(0.9, d.y + (Math.random()-0.5)*0.0015)),
        conf: Math.max(0.55, Math.min(0.99, d.conf + (Math.random()-0.5)*0.01)),
      })));
    }, 1000/30);
    return () => clearInterval(id);
  }, [paused]);

  // queue progression simulation
  useEffect(() => {
    const id = setInterval(() => {
      setQueue(q => {
        if (!q.length) return q;
        const idx = q.findIndex(x => x.state === 'running');
        if (idx === -1) return q;
        // move forward sometimes
        if (Math.random() < 0.35) {
          const next = q.slice(1);
          if (next.length && next[0].state === 'pending') next[0] = { ...next[0], state:'running' };
          pushLog({ kind: q[idx].kind, status:'ok',
                    msg:`${q[idx].kind.toUpperCase()} ${q[idx].target}${q[idx].value?` "${q[idx].value}"`:''} → ok` });
          return next;
        }
        return q;
      });
    }, 2200);
    return () => clearInterval(id);
  }, [pushLog]);

  // recording timer
  useEffect(() => {
    if (!recording || !recStart) return;
    const id = setInterval(() => {
      const ms = Date.now() - recStart;
      const s = Math.floor(ms/1000);
      const cs = Math.floor((ms % 1000)/10);
      setRecElapsed(`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}.${String(cs).padStart(2,'0')}`);
    }, 50);
    return () => clearInterval(id);
  }, [recording, recStart]);

  // handlers
  const onDetectionClick = (d) => {
    pushLog({ kind:'select', status:'ok', msg:`Selected ${clsStyle[d.cls].name} "${d.label}" (conf ${(d.conf*100).toFixed(0)}%) bbox ${(d.x*1920|0)},${(d.y*1080|0)} ${Math.round(d.w*1920)}×${Math.round(d.h*1080)}` });
    if (recording) {
      setMacros(m => [...m, { t:`+${((Date.now()-recStart)/1000).toFixed(3)}s`, action:'inspect', target:`${clsStyle[d.cls].name}#${d.label}`, value:`(${(d.x*1920|0)},${(d.y*1080|0)})` }]);
    }
  };

  const onQueueAction = (action, id) => {
    if (action === 'play')  pushLog({ kind:'queue', status:'ok',   msg:'Queue resumed' });
    if (action === 'pause') pushLog({ kind:'queue', status:'pending', msg:'Queue paused' });
    if (action === 'clear'){ setQueue([]); pushLog({ kind:'queue', status:'ok', msg:'Queue cleared' }); }
    if (action === 'cancel'){
      setQueue(q => q.filter(x => x.id !== id));
      pushLog({ kind:'cancel', status:'fail', msg:`Cancelled action ${id}` });
    }
  };

  const onSelectWindow = (hwnd) => {
    setWindows(ws => ws.map(w => ({ ...w, active: w.hwnd === hwnd })));
    pushLog({ kind:'attach', status:'ok', msg:`Attached to window ${hwnd}` });
  };

  const onRefreshWindows = () => pushLog({ kind:'enum', status:'ok', msg:`Window enumeration: ${initialWindows.length} top-level windows` });

  const toggleRecord = () => {
    if (!recording) {
      setRecording(true);
      setMacros([]);
      setRecStart(Date.now());
      pushLog({ kind:'macro', status:'ok', msg:'Macro recording started' });
    } else {
      setRecording(false);
      pushLog({ kind:'macro', status:'ok', msg:`Macro recording stopped · ${macros.length} events captured` });
    }
  };
  const replayMacro = () => pushLog({ kind:'macro', status:'pending', msg:`Replaying macro · ${macros.length} events` });

  const onQuick = (k) => {
    const labels = { look:'LOOK invoked', find:'FIND_ELEMENT prompt opened', click:'CLICK_AT awaiting coords', type:'TYPE_TEXT awaiting payload', capture:'Screenshot captured' };
    pushLog({ kind:k, status: k==='capture' ? 'ok' : 'pending', msg: labels[k] });
  };
  const onCommand = (text) => {
    pushLog({ kind:'nl', status:'pending', msg:`NL → "${text}" · planning…` });
    setQueue(q => [...q, { id:`q${Date.now()}`, kind:'click', target:'(planned)', value:text, state:'pending' }]);
  };

  return (
    <div className="h-full w-full flex flex-col">
      <TopBar fps={fps} modelStatus={modelStatus} />

      <div className="flex-1 min-h-0 grid gap-3 p-3 grid-bg" style={{gridTemplateColumns:'40fr 35fr 25fr'}}>
        {/* LEFT */}
        <div className="min-h-0 flex flex-col gap-3">
          <CaptureViewer
            detections={detections}
            frame={frame}
            hovered={hovered}
            onHover={setHovered}
            onClick={onDetectionClick}
            paused={paused}
            onTogglePause={()=>setPaused(p=>!p)}
          />
        </div>

        {/* CENTER */}
        <div className="min-h-0 flex flex-col gap-3 overflow-auto">
          <AIUnderstanding text={vlText} tokens={132} ms={284} />
          <ActionQueue queue={queue} onAction={onQueueAction} />
          <MacroRecorder
            recording={recording}
            onToggle={toggleRecord}
            onReplay={replayMacro}
            macros={macros}
            elapsed={recElapsed}
          />
        </div>

        {/* RIGHT */}
        <div className="min-h-0 flex flex-col gap-3">
          <TargetWindows windows={windows} onSelect={onSelectWindow} onRefresh={onRefreshWindows} />
          <ActionLog log={log} onClear={()=>setLog([])} />
          <ConnectionStatus status={connStatus} />
        </div>
      </div>

      <BottomBar onQuick={onQuick} onSubmit={onCommand} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
